# ITR Form Selector + Regime Comparator
# GitHub Pages deployment - no build step needed

# Netlify config (if deploying to Netlify)
# Just drag & drop the folder, or connect repo

# Vercel config
# Push to GitHub, connect repo, auto-deploy

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'"
